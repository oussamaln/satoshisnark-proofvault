<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SatoshiSnark ProofVault</title>

<style>

body{
  background:#0b1120;
  color:white;
  font-family:Arial,sans-serif;
  padding:30px;
}

h1{
  color:#22c55e;
}

.stats{
  display:flex;
  gap:20px;
  margin:20px 0;
  flex-wrap:wrap;
}

.stat-box{
  background:#111827;
  border:1px solid #1f2937;
  padding:15px;
  border-radius:12px;
  min-width:180px;
}

.stat-title{
  color:#9ca3af;
  font-size:14px;
}

.stat-value{
  font-size:24px;
  margin-top:8px;
  color:#4ade80;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:20px;
  margin-top:20px;
}

.label{
  color:#4ade80;
  font-weight:bold;
}

.status{
  margin-top:15px;
  display:inline-block;
  background:#14532d;
  padding:6px 12px;
  border-radius:8px;
}

button{
  margin-top:15px;
  background:#22c55e;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.verify-result{
  margin-top:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>SatoshiSnark ProofVault</h1>

<p>
Verifiable AI Memory Receipts on Xenea Ubusuna Testnet
</p>

<div class="stats">

  <div class="stat-box">
    <div class="stat-title">Total Proofs</div>
    <div class="stat-value" id="totalProofs">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Verified Records</div>
    <div class="stat-value" id="verifiedCount">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Storage Mode</div>
    <div class="stat-value">MOCK DACS</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Network</div>
    <div class="stat-value">UBUSUNA</div>
  </div>

</div>

<div id="proofs"></div>

<script>

async function verifyProof(proofId, elementId){

  const response = await fetch('/api/verify/' + proofId);

  const result = await response.json();

  const element = document.getElementById(elementId);

  if(result.verified){
    element.innerHTML = 'Integrity Status: VERIFIED';
    element.style.color = '#22c55e';
  } else {
    element.innerHTML = 'Integrity Status: TAMPERED';
    element.style.color = 'red';
  }
}

async function loadProofs(){

  const response = await fetch('/api/proofs');

  const proofs = await response.json();

  document.getElementById('totalProofs').innerText = proofs.length;
  document.getElementById('verifiedCount').innerText = proofs.length;

  const container = document.getElementById('proofs');

  container.innerHTML = '';

  proofs.forEach((p, index) => {

    const card = document.createElement('div');

    card.className = 'card';

    card.innerHTML = `
      <div><span class="label">Proof ID:</span> ${p.proofId}</div>
      <div><span class="label">Agent:</span> ${p.agent_name}</div>
      <div><span class="label">Type:</span> ${p.memory_type}</div>
      <div><span class="label">SHA256:</span> ${p.sha256}</div>
      <div><span class="label">File ID:</span> ${p.fileId}</div>
      <div><span class="label">DACS ID:</span> ${p.dacsId}</div>
      <div><span class="label">TX Hash:</span> ${p.txHash}</div>
      <div><span class="label">Stored:</span> ${p.storedAt}</div>

      <div class="status">${p.verificationStatus}</div>

      <br>

      <button onclick="verifyProof('${p.proofId}', 'verify-${index}')">
        Verify Integrity
      </button>

      <div id="verify-${index}" class="verify-result"></div>
    `;

    container.appendChild(card);
  });
}

loadProofs();

</script>

</body>
</html>
